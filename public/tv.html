<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Highscore-TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Ubuntu:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="tv">
    <main class="tv-shell">
      <section class="tv-hero">
        <p class="eyebrow">Moderaternas årsmöte</p>
        <h1>Dagens dörrknackare</h1>
        <p>Topplistan uppdateras automatiskt när nya spelare skickar in sina resultat.</p>
        <div class="tv-actions">
          <button id="resetScoresButton" class="button danger-button" type="button">
            Nollställ highscore
          </button>
          <p id="resetStatus" class="tv-status"></p>
        </div>
      </section>

      <section class="tv-board">
        <header class="tv-board-header">
          <span>Placering</span>
          <span>Namn</span>
          <span>Poäng</span>
        </header>
        <div id="scoreRows" class="tv-rows"></div>
      </section>
    </main>

    <script>
      const scoreRows = document.getElementById("scoreRows");
      const resetScoresButton = document.getElementById("resetScoresButton");
      const resetStatus = document.getElementById("resetStatus");

      function renderScores(scores) {
        if (!scores.length) {
          scoreRows.innerHTML = '<div class="tv-empty">Ingen har spelat än. Var först!</div>';
          return;
        }

        scoreRows.innerHTML = scores
          .slice(0, 10)
          .map(
            (entry, index) => `
              <article class="tv-row ${index === 0 ? "is-leading" : ""}">
                <span>#${index + 1}</span>
                <strong>${entry.name}</strong>
                <span>${entry.score}</span>
              </article>
            `,
          )
          .join("");
      }

      async function loadScores() {
        const response = await fetch("/api/scores");
        const data = await response.json();
        renderScores(data.scores || []);
      }

      async function resetScores() {
        const confirmed = window.confirm(
          "Är du säker på att du vill nollställa highscore-listan?",
        );

        if (!confirmed) {
          return;
        }

        resetScoresButton.disabled = true;
        resetStatus.textContent = "Nollställer...";

        try {
          const response = await fetch("/api/scores/reset", {
            method: "POST",
          });

          if (!response.ok) {
            throw new Error("Kunde inte nollställa highscore-listan.");
          }

          await loadScores();
          resetStatus.textContent = "Highscore-listan är nu nollställd.";
        } catch (error) {
          resetStatus.textContent = error.message;
        } finally {
          setTimeout(() => {
            resetStatus.textContent = "";
          }, 3000);
          resetScoresButton.disabled = false;
        }
      }

      loadScores();
      setInterval(loadScores, 5000);
      resetScoresButton.addEventListener("click", resetScores);
    </script>
  </body>
  </html>
